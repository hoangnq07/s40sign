name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: S40SignTool.exe
            asset_name: S40SignTool-Windows-x64.exe
          - os: ubuntu-latest
            artifact_name: s40_sign_app.py
            asset_name: S40SignTool-Linux.tar.gz
          - os: macos-latest
            artifact_name: s40_sign_app.py
            asset_name: S40SignTool-macOS.tar.gz

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build Windows executable
      if: matrix.os == 'windows-latest'
      run: |
        pip install pyinstaller
        pyinstaller --onefile --windowed --name "S40SignTool" s40_sign_app.py
    
    - name: Package Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p S40SignTool-Linux
        cp *.py *.sh requirements.txt README*.md LICENSE S40SignTool-Linux/
        tar -czf S40SignTool-Linux.tar.gz S40SignTool-Linux/
    
    - name: Package macOS
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p S40SignTool-macOS
        cp *.py *.sh requirements.txt README*.md LICENSE S40SignTool-macOS/
        tar -czf S40SignTool-macOS.tar.gz S40SignTool-macOS/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/${{ matrix.artifact_name }}
          ${{ matrix.asset_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
